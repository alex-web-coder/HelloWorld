<div>
  <h1
    (click)="showAlert()"
    (mouseover)="isMouseOver = true"
    (mouseleave)="isMouseOver = false"
    [style.color]="isMouseOver ? 'blue' : 'black'"
    >
    Text from ts-code: {{ title }}
  </h1>
  <button (click)="changeTitle($event)">Change Title</button>
</div>

<h2>Notes</h2>
<ul>
  <li *ngFor="let note of notes()">
    <a [routerLink]="['/note', note.id]">{{ note.title | uppercase }}</a>
    {{ note.content | noteShortener: 10 }}
    <small>{{ note.createdAt | date:'short' }}</small>
    <small>, {{ note.price | currency: 'EUR' }}</small>
  </li>
</ul>

<app-note-add></app-note-add>
